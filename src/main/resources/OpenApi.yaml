openapi: 3.0.0
info:
  title: API de Gestión de Solicitudes Académicas
  version: 1.0.0
  description: >
    API REST para el sistema de triage y gestión de solicitudes académicas.
    Gestiona el ciclo de vida completo de una solicitud desde su registro hasta su cierre.
    Flujo de estados permitido:
    REGISTRADA → CLASIFICADA → EN_ATENCION → ATENDIDA → CERRADA.
    No se permiten saltos de estado ni retrocesos.

paths:

  /solicitudes:
    post:
      summary: Registrar una nueva solicitud académica
      description: Crea una solicitud en estado inicial REGISTRADA.
      operationId: createSolicitud
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SolicitudCreateRequest'
      responses:
        '201':
          description: Solicitud registrada exitosamente en estado REGISTRADA
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SolicitudResponse'
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: No autorizado
        '500':
          description: Error interno del servidor

    get:
      summary: Consultar solicitudes con filtros
      description: Permite consultar solicitudes según estado, tipo, prioridad o responsable.
      operationId: getSolicitudes
      security:
        - BearerAuth: []
      parameters:
        - name: estado
          in: query
          schema:
            type: string
            enum:
              - REGISTRADA
              - CLASIFICADA
              - EN_ATENCION
              - ATENDIDA
              - CERRADA
        - name: tipoSolicitud
          in: query
          schema:
            type: string
        - name: prioridad
          in: query
          schema:
            type: string
        - name: responsableId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Lista de solicitudes encontradas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SolicitudResponse'
        '401':
          description: No autorizado
        '500':
          description: Error interno del servidor

  /solicitudes/{id}:
    get:
      summary: Obtener una solicitud por ID
      operationId: getSolicitudById
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Solicitud encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SolicitudResponse'
        '404':
          description: Solicitud no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: No autorizado

  /solicitudes/{id}/clasificar:
    patch:
      summary: Clasificar una solicitud
      description: >
        Cambia el estado de REGISTRADA a CLASIFICADA.
        Solo se permite esta transición si la solicitud está en REGISTRADA.
      operationId: clasificarSolicitud
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClasificacionRequest'
      responses:
        '200':
          description: Solicitud clasificada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SolicitudResponse'
        '400':
          description: Transición inválida. Solo se puede clasificar si está en REGISTRADA.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Sin permisos suficientes

  /solicitudes/{id}/asignar:
    patch:
      summary: Asignar responsable a una solicitud
      description: >
        Asigna un responsable a la solicitud.
        Solo puede asignarse si no tiene responsable previamente.
      operationId: asignarResponsable
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AsignacionRequest'
      responses:
        '200':
          description: Responsable asignado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SolicitudResponse'
        '400':
          description: Responsable inválido o ya asignado
        '403':
          description: Sin permisos suficientes

  /solicitudes/{id}/iniciar-atencion:
    patch:
      summary: Cambiar estado a EN_ATENCION
      description: >
        Cambia el estado de CLASIFICADA a EN_ATENCION.
        Requiere que exista un responsable asignado.
      operationId: iniciarAtencion
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Solicitud en estado EN_ATENCION
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SolicitudResponse'
        '400':
          description: No tiene responsable asignado o estado inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /solicitudes/{id}/finalizar:
    patch:
      summary: Marcar solicitud como ATENDIDA
      description: >
        Cambia el estado de EN_ATENCION a ATENDIDA.
        Solo puede realizarse si actualmente está en EN_ATENCION.
      operationId: finalizarSolicitud
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Solicitud en estado ATENDIDA
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SolicitudResponse'
        '400':
          description: Transición inválida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /solicitudes/{id}/cerrar:
    patch:
      summary: Cerrar una solicitud
      description: >
        Cambia el estado de ATENDIDA a CERRADA.
        Una vez cerrada, la solicitud no puede modificarse.
      operationId: cerrarSolicitud
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CierreRequest'
      responses:
        '200':
          description: Solicitud cerrada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SolicitudResponse'
        '400':
          description: No se puede cerrar si no está en estado ATENDIDA
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:

    SolicitudCreateRequest:
      type: object
      required:
        - tipoSolicitud
        - descripcion
        - canalOrigen
      properties:
        tipoSolicitud:
          type: string
          enum:
            - REGISTRO_ASIGNATURA
            - HOMOLOGACION
            - CANCELACION
            - CUPO
            - CONSULTA
        descripcion:
          type: string
          maxLength: 500
        canalOrigen:
          type: string
          enum:
            - CSU
            - CORREO
            - SAC
            - TELEFONICO

    ClasificacionRequest:
      type: object
      required:
        - tipoSolicitud
      properties:
        tipoSolicitud:
          type: string

    AsignacionRequest:
      type: object
      required:
        - responsableId
      properties:
        responsableId:
          type: string

    CierreRequest:
      type: object
      required:
        - observacion
      properties:
        observacion:
          type: string
          maxLength: 300

    SolicitudResponse:
      type: object
      description: >
        Representa una solicitud académica y su estado dentro del ciclo de vida.
        Flujo de estados permitido:
        REGISTRADA → CLASIFICADA → EN_ATENCION → ATENDIDA → CERRADA.
        No se permiten saltos de estado ni retrocesos.
      properties:
        id:
          type: string
        tipoSolicitud:
          type: string
        descripcion:
          type: string
        estado:
          type: string
          description: Estado actual de la solicitud.
          enum:
            - REGISTRADA
            - CLASIFICADA
            - EN_ATENCION
            - ATENDIDA
            - CERRADA
        canalOrigen:
          type: string
        fechaRegistro:
          type: string
          format: date-time
        prioridad:
          type: string
        responsableId:
          type: string
      required:
        - id
        - tipoSolicitud
        - descripcion
        - estado
        - canalOrigen
        - fechaRegistro

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT